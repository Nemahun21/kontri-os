<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Email Verified</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      padding: 50px 20px;
      background: #f5f7fa;
      margin: 0;
    }
    .card {
      max-width: 400px;
      margin: 0 auto;
      background: white;
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    }
    h1 {
      color: #1a5276;
      font-size: 28px;
      margin: 0 0 16px;
    }
    p {
      color: #2c3e50;
      font-size: 16px;
      line-height: 1.5;
      margin: 16px 0;
    }
    .btn {
      display: inline-block;
      background: #1a5276;
      color: white;
      padding: 12px 24px;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 500;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #0e3a5c;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>✅ Email Verified!</h1>
    <p>Your email has been successfully verified.</p>
    <p>You can now open the Kontri-Os app.</p>
    <a id="openAppBtn" href="#" class="btn">Open App</a>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const type = urlParams.get('type');
    const redirectUrl = `com.kontrios://auth/callback?token=${token}&type=${type}`;
    document.getElementById('openAppBtn').href = redirectUrl;
    setTimeout(() => {
      window.location.href = redirectUrl;
    }, 2000);
  </script>
</body>
</html>
